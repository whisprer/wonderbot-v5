[agent]
name = "wonderbot"
response_style = "warm, concise, reflective, technical when useful"
reaction_threshold = 0.18
spontaneous_interval = 9999
max_context_memories = 6
focus_max_items = 6
focus_decay_seconds = 180.0

[codec]
dim = 192
ngram = 3
window_chars = 16
min_segment_chars = 4
cosine_drop = 0.14
lowercase = false
nfkc = true

[memory]
path = "state/memory.json"
max_active_items = 2000
protect_identity = true
importance_threshold = 0.36
min_novelty = 0.08


[journal]
path = "state/journal.json"


[longterm]
path = "state/long_term_memory.json"

[sleep]
auto_enabled = true
auto_sleep_every_explicit_turns = 8
promotion_limit = 6
min_promotion_strength = 0.58
dream_limit = 3
dream_similarity_min = 0.32
dream_similarity_max = 0.82
archive_decay_rate = 0.03
archive_below_strength = 0.12

[selfmodel]
path = "state/self_model.json"
auto_capture_identity = true
auto_capture_preferences = true
auto_capture_constraints = true

[goals]
path = "state/goals.json"
auto_capture_goals = true
auto_focus_new_goal = true
default_priority = 0.68


[plans]
path = "state/plans.json"
auto_capture_plans = true
auto_capture_steps = true
auto_update_goal_progress = true
default_priority = 0.66
context_limit = 3

[consolidation]
auto_enabled = true
auto_every_explicit_turns = 3
summary_min_items = 4
summary_window_items = 12
max_summary_sentences = 3
task_limit = 4
belief_limit = 4
thread_limit = 4

[ganglion]
height = 8
width = 8
channels = 8
bleed = 0.03

[resonance]
sigma = 0.5
tau = 14.134725
alpha = 1.2
prime_count = 32

[backend]
kind = "lvtc"
hf_model = "distilgpt2"
max_new_tokens = 120
temperature = 0.8
delta_scale = 0.24
creative_depth = 1
anchor_pullback = 0.72
novelty_threshold = 0.10
drift_threshold = 0.58
repetition_threshold = 0.34
latency_budget_ms = 30

[live]
enabled = false
poll_interval_ms = 350
sensor_memory_threshold = 0.10
sensor_reaction_threshold = 0.18
sensor_reaction_gain = 1.15

[camera]
enabled = false
index = 0
width = 320
height = 240
motion_threshold = 0.08
brightness_threshold = 0.05
min_salience = 0.12


[microphone]
device = "Microphone Array (Realtek(R) Audio), Windows WASAPI"
sample_rate = 48000
channels = 1
window_seconds = 0.80
rms_threshold = 0.004
peak_threshold = 0.015
min_salience = 0.020
latency = "high"
rolling_seconds = 8.0
transcript_window_seconds = 6.0
preamp_gain = 2.5
agc_target_rms = 0.05
agc_max_gain = 4.0
vad_enabled = true
vad_trigger_level = 2.5
vad_min_voiced_seconds = 0.10
vad_min_voiced_ratio = 0.03

[caption]
enabled = false
model = "Salesforce/blip-image-captioning-base"
max_new_tokens = 24
interval_seconds = 3.0
salience_threshold = 0.08
min_chars = 12

[speech]
model = "distil-whisper/distil-small.en"
language = "en"
salience_threshold = 0.08
min_chars = 1
cooldown_seconds = 0.20

[stability]
sensor_response_cooldown_seconds = 2.0
spontaneous_cooldown_seconds = 6.0
repeated_stimulus_cooldown_seconds = 3.5
same_source_cooldown_seconds = 1.25
minimum_response_salience = 0.18

[logging]
enabled = true
path = "state/replay.jsonl"
flush_each_write = true

[execution]
path = "state/action_runs.json"
default_dry_run = true
auto_mark_step_doing = true
auto_mark_done_on_success = false


[tts]
enabled = false
engine = "hf"
fallback_engine = "pyttsx3"
rate = 185
volume = 0.9
voice_contains = ""
hf_model = "facebook/mms-tts-eng"
hf_vocoder_model = "microsoft/speecht5_hifigan"
hf_speaker_embeddings_source = "Matthijs/cmu-arctic-xvectors"
hf_speaker_id = 7306
hf_device = "cpu"
hf_sample_rate = 16000
openai_model = "gpt-4o-mini-tts"
openai_voice = "sage"
openai_response_format = "wav"
openai_speed = 1.0
openai_timeout_seconds = 30.0
openai_api_key_env = "OPENAI_API_KEY"
openai_base_url = "https://api.openai.com/v1"
playback_backend = "auto"
speak_user_responses = true
speak_sensor_responses = false
speak_spontaneous = false
